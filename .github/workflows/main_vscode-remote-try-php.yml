# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - vscode-remote-try-php

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.x'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress

      - name: Generate .env from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          APP_NAME="Prime CRM"
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=https://crmprime.online
          EOF
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=sqlsrv" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=1433" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "SESSION_DRIVER=file" >> .env
          echo "SESSION_LIFETIME=120" >> .env
          echo "SESSION_ENCRYPT=true" >> .env
          echo "SESSION_SECURE_COOKIE=true" >> .env
          echo "CACHE_STORE=file" >> .env
          echo "QUEUE_CONNECTION=database" >> .env
          echo "FILESYSTEM_DISK=public" >> .env
          echo "LOG_CHANNEL=stderr" >> .env
          echo "LOG_LEVEL=warning" >> .env
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env
          echo "TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID }}" >> .env
          echo "TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET }}" >> .env
          echo "TWILIO_SMS_ENABLED=true" >> .env
          echo "TWILIO_WEBHOOK_VALIDATE_SIGNATURE=true" >> .env
          echo "TWILIO_DEFAULT_COUNTRY=US" >> .env
          echo "TWILIO_LOG_RAW_WEBHOOKS=true" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENAI_MODEL=gpt-4o-mini" >> .env

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          include-hidden-files: true
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_26D3E6154BB74CB9AAB27AA559A30360 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D52B23D69D2F460BB8A8B76C864D84E7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFE4FE73AC434578AAA3ED2474A7D4EB }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'vscode-remote-try-php'
          slot-name: 'Production'
          package: .
          