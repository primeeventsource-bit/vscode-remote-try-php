# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - vscode-remote-try-php

on:
  # Azure auto-deploy disabled — Laravel Cloud is now the primary deployment target.
  # Uncomment push trigger below to re-enable Azure deploys if needed for rollback.
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Install composer dependencies
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer update --prefer-dist --no-progress --no-dev --no-interaction

      - name: Generate .env from GitHub Secrets
        env:
          ENV_APP_KEY: ${{ secrets.APP_KEY }}
          ENV_DB_HOST: ${{ secrets.DB_HOST }}
          ENV_DB_DATABASE: ${{ secrets.DB_DATABASE }}
          ENV_DB_USERNAME: ${{ secrets.DB_USERNAME }}
          ENV_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ENV_TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          ENV_TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          ENV_TWILIO_API_KEY_SID: ${{ secrets.TWILIO_API_KEY_SID }}
          ENV_TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}
          ENV_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          printf '%s\n' \
            'APP_NAME="Prime CRM"' \
            'APP_ENV=production' \
            'APP_DEBUG=false' \
            'APP_URL=https://crmprime.online' \
            "APP_KEY=${ENV_APP_KEY}" \
            'DB_CONNECTION=sqlsrv' \
            "DB_HOST=${ENV_DB_HOST}" \
            'DB_PORT=1433' \
            "DB_DATABASE=${ENV_DB_DATABASE}" \
            "DB_USERNAME=${ENV_DB_USERNAME}" \
            "DB_PASSWORD='${ENV_DB_PASSWORD}'" \
            'SESSION_DRIVER=file' \
            'SESSION_LIFETIME=120' \
            'SESSION_ENCRYPT=true' \
            'SESSION_SECURE_COOKIE=true' \
            'CACHE_STORE=file' \
            'QUEUE_CONNECTION=database' \
            'FILESYSTEM_DISK=public' \
            'LOG_CHANNEL=stderr' \
            'LOG_LEVEL=warning' \
            "TWILIO_ACCOUNT_SID=${ENV_TWILIO_ACCOUNT_SID}" \
            "TWILIO_AUTH_TOKEN=${ENV_TWILIO_AUTH_TOKEN}" \
            "TWILIO_API_KEY_SID=${ENV_TWILIO_API_KEY_SID}" \
            "TWILIO_API_KEY_SECRET=${ENV_TWILIO_API_KEY_SECRET}" \
            'TWILIO_SMS_ENABLED=true' \
            'TWILIO_WEBHOOK_VALIDATE_SIGNATURE=true' \
            'TWILIO_DEFAULT_COUNTRY=US' \
            'TWILIO_LOG_RAW_WEBHOOKS=true' \
            "OPENAI_API_KEY=${ENV_OPENAI_API_KEY}" \
            'OPENAI_MODEL=gpt-4o-mini' \
            > .env
          cp .env env.production
          echo ".env generated with $(wc -l < .env) lines"
          grep -c "TWILIO" .env && echo "Twilio vars present"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          include-hidden-files: true
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_26D3E6154BB74CB9AAB27AA559A30360 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D52B23D69D2F460BB8A8B76C864D84E7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFE4FE73AC434578AAA3ED2474A7D4EB }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'vscode-remote-try-php'
          slot-name: 'Production'
          package: .
          