# Laravel Cloud deploy hooks.
# Runs after each successful build before traffic is switched over.
#
# If Laravel Cloud's dashboard "Deploy commands" UI is the source of truth
# for your project, paste the `deploy` block contents there instead; this
# file is a checked-in fallback / reference.

build:
  - composer install --no-dev --optimize-autoloader --no-interaction
  - php artisan storage:link

deploy:
  # --force = required in production envs (suppresses interactive prompt)
  - php artisan migrate --force
  - php artisan config:cache
  - php artisan route:cache
  - php artisan view:cache
  - php artisan event:cache
